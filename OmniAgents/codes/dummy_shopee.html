<!DOCTYPE html>
<html>
<head>
    <title>Shopee Siêu Sale (Bản Mock)</title>
    <style>
        body { font-family: Arial; background-color: #f5f5f5; padding: 20px; }
        .product-card { background: white; width: 300px; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .product-name { font-size: 20px; font-weight: bold; color: #333; }
        .product-price { font-size: 24px; color: #ee4d2d; margin: 10px 0; font-weight: bold;}
        .warning { color: red; font-size: 12px; font-style: italic; }
        .buy-btn { background: #ee4d2d; color: white; border: none; padding: 10px 20px; font-size: 16px; cursor: pointer; width: 100%; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>🌟 FLASHSALE SHOPEE NGÀY ĐẸP TRỜI</h1>
    
    <div class="product-card">
        <div style="background:#eee; height: 150px; text-align: center; line-height: 150px; font-size: 50px;">📱</div>
        <div class="product-name">iPhone 16 Pro Max 1TB (Hàng Xách Tay Mỹ)</div>
        <div class="product-price">Giá: 9.990.000 VNĐ</div>
        <p class="warning">Lưu ý: Yêu cầu chuyển khoản cọc trước 100%.</p>
        <button class="buy-btn">MUA NGAY KẺO HẾT</button>
    </div>
</body>
</html>
